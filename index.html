<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Polla Mundial 2026</title>
<style>
:root{--green:#1B4332;--green2:#2D6A4F;--green3:#40916C;--green-light:#D8F3DC;--gold:#F4A93B;--gold-light:#FFF3CD;--bg:#F8F9FA;--card:#fff;--border:#DEE2E6;--text:#212529;--muted:#6C757D;--danger:#DC3545;--success:#198754;--info:#0D6EFD;--radius:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{display:flex;flex-direction:column;min-height:100vh;}
header{background:var(--green);color:#fff;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25);}
header h1{font-size:1rem;font-weight:600;letter-spacing:.2px;}
.user-pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:4px 11px;font-size:.78rem;cursor:pointer;white-space:nowrap;}
.user-pill:hover{background:rgba(255,255,255,.25);}
main{flex:1;padding:1rem;max-width:880px;margin:0 auto;width:100%;}
.tab-bar{display:flex;gap:3px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:3px;margin-bottom:1.1rem;overflow-x:auto;}
.tab{flex:1;min-width:fit-content;padding:6px 8px;text-align:center;border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:500;color:var(--muted);border:none;background:transparent;transition:all .15s;white-space:nowrap;}
.tab.active{background:var(--green);color:#fff;}
.tab:hover:not(.active){background:var(--bg);}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:.9rem;}
.card-title{font-size:.92rem;font-weight:600;margin-bottom:.9rem;display:flex;align-items:center;gap:7px;}
.section-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:1.1rem 0 .5rem;padding-left:2px;}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.8rem .9rem;margin-bottom:.55rem;}
.match-header{display:flex;align-items:center;gap:5px;margin-bottom:.6rem;font-size:.72rem;color:var(--muted);flex-wrap:wrap;}
.phase-badge{background:var(--green-light);color:var(--green2);padding:2px 6px;border-radius:10px;font-size:.66rem;font-weight:600;}
.locked-badge{background:#FEE2E2;color:#DC2626;padding:2px 6px;border-radius:10px;font-size:.66rem;font-weight:600;}
.open-badge{background:#DCFCE7;color:#16A34A;padding:2px 6px;border-radius:10px;font-size:.66rem;font-weight:600;}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.6rem;}
.team-name{font-weight:600;font-size:.9rem;}
.team-left{text-align:right;}.team-right{text-align:left;}
.vs{color:var(--muted);font-size:.82rem;font-weight:500;text-align:center;}
.score-display{font-size:1.3rem;font-weight:700;color:var(--green);text-align:center;}
.score-inputs{display:flex;align-items:center;gap:5px;justify-content:center;}
.score-input{width:52px;height:42px;text-align:center;font-size:1.1rem;font-weight:700;border:2px solid var(--border);border-radius:8px;background:#fff;color:var(--text);-moz-appearance:textfield;}
.score-input::-webkit-outer-spin-button,.score-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.score-input:focus{outline:none;border-color:var(--green3);box-shadow:0 0 0 3px rgba(64,145,108,.12);}
.score-input:disabled{background:#F3F4F6;color:var(--muted);cursor:not-allowed;}
.score-sep{font-size:1rem;font-weight:700;color:var(--muted);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;font-size:.82rem;font-weight:500;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--green);color:#fff;}.btn-primary:hover{background:var(--green2);}
.btn-danger{background:var(--danger);color:#fff;}.btn-danger:hover{background:#bb2d3b;}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border);}.btn-outline:hover{background:var(--bg);}
.btn-sm{padding:4px 10px;font-size:.76rem;}
.btn-gold{background:var(--gold);color:#fff;}.btn-gold:hover{background:#e09524;}
.btn-green{background:var(--green3);color:#fff;}.btn-green:hover{background:var(--green2);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.form-group{margin-bottom:.8rem;}
label{display:block;font-size:.8rem;font-weight:500;margin-bottom:.3rem;color:var(--text);}
input[type=text],input[type=number],input[type=datetime-local],select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:.86rem;background:#fff;color:var(--text);}
input:focus,select:focus{outline:none;border-color:var(--green3);box-shadow:0 0 0 3px rgba(64,145,108,.12);}
.hint{font-size:.72rem;color:var(--muted);margin-top:.2rem;}
.rank-table{width:100%;border-collapse:collapse;font-size:.83rem;}
.rank-table th{text-align:left;padding:8px 10px;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);border-bottom:2px solid var(--border);background:var(--bg);}
.rank-table td{padding:10px;border-bottom:1px solid var(--border);}
.rank-table tr:last-child td{border-bottom:none;}
.rank-table tr:hover td{background:var(--bg);}
.rank-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;}
.rank-1{background:#FEF3C7;color:#92400E;}.rank-2{background:#F1F5F9;color:#475569;}.rank-3{background:#FEF0E7;color:#9A3412;}.rank-n{background:var(--bg);color:var(--muted);}
.pts-badge{background:var(--green-light);color:var(--green2);padding:2px 8px;border-radius:20px;font-weight:700;font-size:.82rem;}
.prize-badge{background:var(--gold-light);color:#92400E;padding:2px 8px;border-radius:20px;font-weight:700;font-size:.76rem;}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px);padding:1.5rem;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem 1.75rem;width:100%;max-width:380px;text-align:center;}
.login-card h2{font-size:1.25rem;font-weight:700;margin-bottom:.35rem;}
.login-card p{color:var(--muted);font-size:.85rem;margin-bottom:1.1rem;}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
@media(max-width:480px){.admin-grid{grid-template-columns:1fr;}}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem;text-align:center;}
.stat-num{font-size:1.6rem;font-weight:700;color:var(--green);}
.stat-label{font-size:.72rem;color:var(--muted);margin-top:2px;}
.toast{position:fixed;bottom:1.2rem;right:1.2rem;left:1.2rem;max-width:320px;margin:0 auto;background:#222;color:#fff;padding:10px 16px;border-radius:10px;font-size:.83rem;z-index:9999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;text-align:center;}
.toast.show{opacity:1;transform:translateY(0);}
.empty{text-align:center;padding:2.5rem;color:var(--muted);}
.row{display:flex;align-items:center;gap:7px;}
.flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;}
.ml-auto{margin-left:auto;}
.inline-pts{font-size:.68rem;background:var(--green-light);color:var(--green2);padding:1px 6px;border-radius:10px;font-weight:600;}
.champion-banner{background:linear-gradient(135deg,#1B4332,#2D6A4F);color:#fff;border-radius:var(--radius);padding:.9rem 1.1rem;margin-bottom:.9rem;display:flex;align-items:center;gap:.9rem;}
.champ-row{display:flex;gap:.6rem;align-items:flex-end;}
.progress-bar-wrap{background:var(--border);border-radius:4px;height:4px;margin-top:5px;}
.progress-bar{background:var(--green3);height:4px;border-radius:4px;}
.fixture-list{max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;}
.fixture-item{display:flex;align-items:center;padding:8px 11px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;gap:8px;}
.fixture-item:last-child{border-bottom:none;}
.fixture-item:hover{background:var(--bg);}
.fixture-item.selected{background:#E8F5E9;}
.fixture-item .fi-teams{font-weight:500;font-size:.84rem;flex:1;}
.fixture-item .fi-meta{font-size:.7rem;color:var(--muted);white-space:nowrap;}
.fixture-item .fi-check{color:var(--success);font-size:.95rem;font-weight:700;width:14px;}
.phase-group-header{padding:5px 11px;background:var(--bg);font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);border-bottom:1px solid var(--border);}
.search-count{font-size:.72rem;color:var(--muted);margin-bottom:.4rem;}
/* Loading overlay */
.loading-overlay{position:fixed;inset:0;background:rgba(27,67,50,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;gap:1rem;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-overlay p{font-size:.9rem;opacity:.85;}
/* Sync indicator */
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4ADE80;display:inline-block;margin-left:6px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.sync-dot.syncing{background:#F4A93B;animation:spin .6s linear infinite;width:10px;height:10px;border:2px solid rgba(255,255,255,.3);border-top-color:#F4A93B;border-radius:50%;}
.sync-dot.error{background:#EF4444;animation:none;}
</style>
</head>

// Supabase REST helper
async function sb(table, method="GET", body=null, extra=""){
  const url=`${SB_URL}/rest/v1/${table}${extra}`;
  const headers={"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=representation"};
  const res=await fetch(url,{method,headers,body:body?JSON.stringify(body):null});
  if(!res.ok){const e=await res.text();throw new Error(`${method} ${table}: ${res.status} ${e}`);}
  const ct=res.headers.get("content-type")||"";
  if(ct.includes("json")&&res.status!==204){return res.json();}
  return null;
}
const dbGet=(t,q="")=>sb(t,"GET",null,`?${q}`);
const dbPost=(t,b)=>sb(t,"POST",b);
const dbPatch=(t,b,q)=>sb(t,"PATCH",b,`?${q}`);
const dbUpsert=(t,b)=>sb(t,"POST",b,"").then(()=>null).catch(()=>sb(t,"PATCH",b,"?id=eq."+b.id));
const dbDelete=(t,q)=>sb(t,"DELETE",null,`?${q}`);

// Upsert helper using Prefer: resolution=merge-duplicates
async function upsert(table, data){
  const url=`${SB_URL}/rest/v1/${table}`;
  const headers={"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"resolution=merge-duplicates,return=minimal"};
  const res=await fetch(url,{method:"POST",headers,body:JSON.stringify(data)});
  if(!res.ok){const e=await res.text();throw new Error(`upsert ${table}: ${res.status} ${e}`);}
  return null;
}

  d.title=s==="ok"?"Conectado":s==="syncing"?"Sincronizando...":"Error de conexión";

// LOAD ALL DATA FROM SUPABASE
// ═══════════════════════════════════════════════════
async function loadAll(){
  setSyncStatus("syncing");
  try{
    const [users,matches,preds,champPicks,cfg]=await Promise.all([
      dbGet("users","order=created_at.asc"),
      dbGet("matches","order=datetime.asc"),
      dbGet("predictions","select=user_id,match_id,home,away"),
      dbGet("champion_picks","select=user_id,team"),
      dbGet("config","key=eq.champion"),
    ]);
    STATE.users=users||[];
    STATE.matches=(matches||[]).map(m=>({
      id:m.id,home:m.home,away:m.away,phase:m.phase,group:m.match_group,
      datetime:m.datetime,locked:m.locked,homeScore:m.home_score||"",awayScore:m.away_score||""
    }));
    STATE.predictions={};
    (preds||[]).forEach(p=>{
      if(!STATE.predictions[p.user_id])STATE.predictions[p.user_id]={};
      STATE.predictions[p.user_id][p.match_id]={home:p.home||"",away:p.away||""};
    });
    STATE.champion_picks={};
    (champPicks||[]).forEach(c=>{STATE.champion_picks[c.user_id]=c.team;});
    STATE.champion=(cfg&&cfg[0])?cfg[0].value:"";
    setSyncStatus("ok");
  }catch(e){
    console.error(e);setSyncStatus("error");
    toast("Error cargando datos. Revisa tu conexión.",true);
  }
}

function checkAutoLock(){
  const now=new Date();let changed=false;
  STATE.matches.forEach(m=>{if(m.datetime&&!m.locked&&new Date(m.datetime)<=now){m.locked=true;changed=true;}});
}

async function handleLogin(name,pass){
  if(!name.trim()){toast("Escribe tu nombre",true);return;}
  const isAdmin=pass===ADMIN_PASS;
  let user=STATE.users.find(u=>u.name.toLowerCase()===name.toLowerCase().trim());
  const id=user?user.id:(isAdmin?"admin":"u_"+Date.now());
  try{
    setSyncStatus("syncing");
    await upsert("users",{id,name:name.trim(),is_admin:isAdmin});
    if(!user){
      user={id,name:name.trim(),is_admin:isAdmin};
      STATE.users.push(user);
      if(!isAdmin)toast("¡Bienvenido "+name.trim()+"!");
    }
    setSyncStatus("ok");
  }catch(e){setSyncStatus("error");toast("Error al registrar: "+e.message,true);return;}
  currentUser={id,name:name.trim(),isAdmin:isAdmin||user.is_admin||false};
  document.getElementById("header-user").textContent=currentUser.name+(currentUser.isAdmin?" ★":"");
  currentTab=currentUser.isAdmin?"admin":"pronos";
  render();
}
function handleLogout(){currentUser=null;currentTab="pronos";render();}

// ═══════════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════════
function calcStats(userId){
  let pts=0,exact=0;
  const preds=STATE.predictions[userId]||{};
  STATE.matches.forEach(m=>{
    if(m.homeScore===""||m.homeScore===undefined||m.awayScore===""||m.awayScore===undefined)return;
    const pred=preds[m.id];if(!pred)return;
    const rH=parseInt(m.homeScore),rA=parseInt(m.awayScore),pH=parseInt(pred.home),pA=parseInt(pred.away);
    if(isNaN(rH)||isNaN(rA)||isNaN(pH)||isNaN(pA))return;
    if(pH===rH&&pA===rA){pts+=3;exact++;return;}
    const rW=rH>rA?"h":rA>rH?"a":"d",pW=pH>pA?"h":pA>pH?"a":"d";
    if(rW===pW)pts+=2;
  });
  const champHit=STATE.champion&&STATE.champion_picks[userId]&&
    STATE.champion.toLowerCase().trim()===STATE.champion_picks[userId].toLowerCase().trim();
  if(champHit)pts+=10;
  return{pts,exact,champHit:!!champHit};
}
function calcPoints(userId){return calcStats(userId).pts;}
function getRanking(){
  const users=[...STATE.users].map(u=>({...u,...calcStats(u.id||u.id)}));
  users.sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    if(b.exact!==a.exact)return b.exact-a.exact;
    return(b.champHit?1:0)-(a.champHit?1:0);
  });
  let pos=1;
  users.forEach((u,i)=>{
    if(i>0){const p=users[i-1];if(!(u.pts===p.pts&&u.exact===p.exact&&u.champHit===p.champHit))pos=i+1;}
    u.pos=pos;
  });
  return users;
}
const PRIZE_PCT=[0,.50,.35,.15];
function getPrizesForUser(userId,ranking){
  const u=ranking.find(r=>r.id===userId);if(!u)return 0;
  const total=STATE.users.length*INSCRIPTION;
  const tied=ranking.filter(r=>r.pos===u.pos);
  if(u.pos>3)return 0;
  let poolPct=0;
  tied.forEach((_,i)=>{const slot=u.pos+i;if(slot<=3)poolPct+=PRIZE_PCT[slot];});
  return(total*poolPct)/tied.length;
}
function getMatchPts(userId,matchId){
  const m=STATE.matches.find(x=>x.id===matchId);
  if(!m||m.homeScore===""||m.homeScore===undefined||m.awayScore===""||m.awayScore===undefined)return null;
  const pred=(STATE.predictions[userId]||{})[matchId];if(!pred)return 0;
  const rH=parseInt(m.homeScore),rA=parseInt(m.awayScore),pH=parseInt(pred.home),pA=parseInt(pred.away);
  if(isNaN(rH)||isNaN(rA)||isNaN(pH)||isNaN(pA))return 0;
  if(pH===rH&&pA===rA)return 3;
  const rW=rH>rA?"h":rA>rH?"a":"d",pW=pH>pA?"h":pA>pH?"a":"d";
  return rW===pW?2:0;
}

function render(){
  const main=document.getElementById("app-main");
  if(!currentUser){main.innerHTML=renderLogin();return;}
  const tabs=currentUser.isAdmin
    ?[["pronos","🔮 Pronós."],["ranking","🏆 Ranking"],["partidos","⚽ Partidos"],["revisar","👁 Revisar"],["admin","⚙️ Admin"]]
    :[["pronos","🔮 Pronós."],["ranking","🏆 Ranking"],["partidos","⚽ Partidos"]];
  let tb=`<div class="tab-bar">`;
  tabs.forEach(([id,label])=>{tb+=`<button class="tab ${currentTab===id?"active":""}" onclick="setTab('${id}')">${label}</button>`;});
  tb+=`</div>`;
  let content="";
  if(currentTab==="pronos")content=renderPronos();
  else if(currentTab==="ranking")content=renderRanking();
  else if(currentTab==="partidos")content=renderPartidos();
  else if(currentTab==="revisar")content=renderRevisar();
  else if(currentTab==="admin")content=renderAdmin();
  main.innerHTML=tb+content;
}

// PRONÓSTICOS
function renderPronos(){
  const uid=currentUser.id,preds=STATE.predictions[uid]||{},champPick=STATE.champion_picks[uid]||"";
  const stats=calcStats(uid);
  const ranking=getRanking();
  const myRank=ranking.find(r=>r.id===uid);
  const myPos=myRank?myRank.pos:"-";
  const myPrize=myRank?getPrizesForUser(uid,ranking):0;
  const pendingMatches=STATE.matches.filter(m=>!m.locked).sort((a,b)=>new Date(a.datetime||0)-new Date(b.datetime||0));
  const upcomingMatches=pendingMatches.slice(0,5);
  const pendingPreds=pendingMatches.filter(m=>{const p=preds[m.id];return!p||p.home===""||p.away==="";}).length;

  // Stats
  let html=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.55rem;margin-bottom:.9rem">
    <div class="stat-box"><div class="stat-num" style="color:var(--green)">${stats.pts}</div><div class="stat-label">Mis puntos</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--green2)">${stats.exact}</div><div class="stat-label">Exactos</div></div>
    <div class="stat-box"><div class="stat-num" style="font-size:1.3rem">${myPos}°</div><div class="stat-label">Posición</div></div>
    <div class="stat-box"><div class="stat-num" style="font-size:.95rem;color:#92400E">${myPrize>0?fmt(myPrize):"–"}</div><div class="stat-label">Premio</div></div>
  </div>`;

  // Top 3
  const medals=["🥇","🥈","🥉"];
  const medalBg=["linear-gradient(135deg,#FFF9C4,#FEF3C7)","linear-gradient(135deg,#F8FAFC,#F1F5F9)","linear-gradient(135deg,#FFF0E6,#FEF0E7)"];
  const medalBorder=["#F4A93B","#94A3B8","#CD7F32"];
  const medalTextCol=["#92400E","#475569","#9A3412"];
  const display=[];const seenPos=new Set();
  for(const u of ranking){if(!seenPos.has(u.pos)&&display.length<3){display.push(u);seenPos.add(u.pos);}}
  if(display.length>0){
    html+=`<div style="margin-bottom:.9rem">
      <div class="section-title" style="margin-top:0">🏆 Top 3 del torneo</div>
      <div style="display:grid;grid-template-columns:repeat(${display.length},1fr);gap:.55rem">`;
    display.forEach((u,i)=>{
      const isMe=u.id===uid;
      const sharedPos=ranking.filter(r=>r.pos===u.pos);
      const prizeAmt=getPrizesForUser(u.id,ranking);
      const allNames=sharedPos.map(r=>r.name.split(" ")[0]).join(", ");
      html+=`<div style="background:${medalBg[i]};border:1.5px solid ${medalBorder[i]};border-radius:12px;padding:.75rem .6rem;text-align:center;position:relative;${isMe?"box-shadow:0 0 0 2px var(--green);":""}">
        ${isMe?`<div style="position:absolute;top:-8px;right:6px;background:var(--green);color:#fff;font-size:.55rem;font-weight:700;padding:2px 6px;border-radius:8px">TÚ</div>`:""}
        <div style="font-size:1.4rem;margin-bottom:2px">${medals[i]}</div>
        <div style="font-size:.74rem;font-weight:700;color:${medalTextCol[i]};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sharedPos.length>1?allNames:u.name}</div>
        ${sharedPos.length>1?`<div style="font-size:.58rem;color:${medalTextCol[i]};opacity:.7">${sharedPos.length} empatados</div>`:""}
        <div style="font-size:1.2rem;font-weight:800;color:${medalTextCol[i]}">${u.pts}</div>
        <div style="font-size:.58rem;color:${medalTextCol[i]};opacity:.7;margin-bottom:2px">pts</div>
        ${prizeAmt>0?`<div style="font-size:.62rem;color:${medalTextCol[i]};font-weight:600">${fmt(prizeAmt)}${sharedPos.length>1?" c/u":""}</div>`:""}
      </div>`;
    });
    html+=`</div>`;
    if(myPos!=="-"&&myPos>3){
      const userAbove=ranking.find(r=>r.pos===myPos-1);
      const diff=userAbove?userAbove.pts-stats.pts:0;
      html+=`<div style="margin-top:.5rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.5rem .9rem;font-size:.76rem;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:3px">
        <span>Estás en <strong style="color:var(--text)">${myPos}° lugar</strong></span>
        ${diff>0?`<span>Necesitas <strong style="color:var(--green)">${diff} pts</strong> para subir</span>`:`<span style="color:var(--success);font-weight:600">¡Estás en premios!</span>`}
      </div>`;
    }
    html+=`</div>`;
  }

  // Alerta pendientes
  if(pendingPreds>0){
    html+=`<div style="background:#FFF3CD;border:1px solid #FBBF24;border-radius:var(--radius);padding:.65rem .9rem;margin-bottom:.9rem;display:flex;align-items:center;gap:8px;font-size:.82rem">
      <span>⚠️</span><span>Tienes <strong>${pendingPreds} partido${pendingPreds>1?"s":""}</strong> sin pronosticar.</span>
    </div>`;
  }

  // Próximos partidos
  if(upcomingMatches.length>0){
    html+=`<div class="card"><div class="card-title">📅 Próximos partidos</div>`;
    upcomingMatches.forEach(m=>{
      const pred=preds[m.id]||{home:"",away:""};
      const hasPred=pred.home!==""&&pred.away!=="";
      html+=`<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.5rem;padding:.6rem 0;border-bottom:1px solid var(--border)">
        <div style="text-align:right"><div class="team-name" style="font-size:.85rem">${m.home}</div></div>
        <div style="text-align:center;min-width:120px">
          <div style="font-size:.62rem;color:var(--muted);margin-bottom:2px">${m.datetime?fmtDate(m.datetime):m.group||""}</div>
          <div class="score-inputs">
            <input class="score-input" type="number" min="0" max="20" value="${pred.home}" id="ph_${m.id}" onblur="savePred('${m.id}')" oninput="scheduleSave('${m.id}')" style="width:40px;height:35px;font-size:.88rem">
            <span class="score-sep">–</span>
            <input class="score-input" type="number" min="0" max="20" value="${pred.away}" id="pa_${m.id}" onblur="savePred('${m.id}')" oninput="scheduleSave('${m.id}')" style="width:40px;height:35px;font-size:.88rem">
          </div>
          <div id="lbl_${m.id}" style="font-size:.6rem;margin-top:2px;${hasPred?"color:var(--success);font-weight:600":"color:var(--danger)"}">${hasPred?"✓ guardado":"sin pronosticar"}</div>
        </div>
        <div style="text-align:left"><div class="team-name" style="font-size:.85rem">${m.away}</div></div>
      </div>`;
    });
    if(pendingMatches.length>5)html+=`<div style="font-size:.74rem;color:var(--muted);padding-top:.5rem;text-align:center">+${pendingMatches.length-5} partidos más abajo ↓</div>`;
    html+=`</div>`;
  }

  // Campeón
  html+=`<div class="card"><div class="card-title">🏆 Predicción del Campeón <span style="font-size:.7rem;font-weight:400;color:var(--muted)">(+10 pts)</span></div>`;
  if(STATE.champion){
    html+=champPick
      ?`<div class="row" style="gap:7px;flex-wrap:wrap"><span style="font-size:.85rem">Tu predicción:</span><strong>${champPick}</strong>${champPick.toLowerCase().trim()===STATE.champion.toLowerCase().trim()?'<span class="inline-pts">+10 pts ✓</span>':'<span style="color:var(--danger);font-size:.74rem">No acertaste</span>'}</div><p class="hint" style="margin-top:.4rem">Predicción bloqueada — el torneo ya inició.</p>`
      :`<p style="color:var(--danger);font-size:.82rem">⚠️ El torneo ya comenzó y no hiciste tu predicción del campeón.</p>`;
  }else{
    html+=`<div class="champ-row"><div style="flex:1"><input type="text" id="champ-input" value="${champPick}" placeholder="Ej: Argentina, Brasil..."></div>
      <button class="btn btn-gold btn-sm" onclick="saveChampion()">Guardar</button></div>
    <p class="hint" style="margin-top:.35rem">Se bloquea cuando el admin inicia el torneo.</p>`;
  }
  html+=`</div>`;

  if(!STATE.matches.length)return html+`<div class="empty"><p>El administrador aún no ha cargado partidos.</p></div>`;

  // Historial jugados
  const played=STATE.matches.filter(m=>m.locked&&m.homeScore!==""&&m.homeScore!==undefined&&m.awayScore!==""&&m.awayScore!==undefined);
  if(played.length){
    html+=`<div class="section-title">Historial — partidos jugados</div>`;

      const pred=preds[m.id]||{home:"",away:""};

        </div>
        <div class="team-right"><span class="team-name">${m.away}</span></div>
      </div></div>`;
    });

  // Más partidos abiertos
  const openRest=pendingMatches.slice(5);
  if(openRest.length){
    html+=`<div class="section-title">Más partidos por jugar</div>`;
    openRest.forEach(m=>{
      const pred=preds[m.id]||{home:"",away:""};
      html+=`<div class="match-card"><div class="match-header">
        <span class="phase-badge">${m.group||m.phase}</span>
        <span class="open-badge">✏️ Abierto</span>
        ${m.datetime?`<span>${fmtDate(m.datetime)}</span>`:""}
      </div><div class="match-teams">
        <div class="team-left"><span class="team-name">${m.home}</span></div>
        <div class="score-inputs">
          <input class="score-input" type="number" min="0" max="20" value="${pred.home}" id="ph_${m.id}" onblur="savePred('${m.id}')" oninput="scheduleSave('${m.id}')">

        </div>
        <div class="team-right"><span class="team-name">${m.away}</span></div>
      </div></div>`;

  return html;
}

function renderAdmin(){

    <div class="stat-box"><div class="stat-num">${STATE.matches.filter(m=>m.locked).length}</div><div class="stat-label">Cerrados</div></div>
  </div>`;
  html+=`<div class="card"><div class="card-title">🏆 Campeón del torneo</div>
    <p style="font-size:.78rem;color:var(--muted);margin-bottom:.7rem">Al definir el campeón se bloquean las predicciones y se calculan los +10 pts.</p>
    ${STATE.champion
      ?`<div class="row"><strong style="color:var(--green)">${STATE.champion}</strong><span class="inline-pts">✓</span><button class="btn btn-outline btn-sm ml-auto" onclick="clearChampion()">Cambiar</button></div>`
      :`<div class="champ-row"><div style="flex:1"><input type="text" id="admin-champ" placeholder="Nombre del equipo campeón"></div>
         <button class="btn btn-gold btn-sm" onclick="adminSetChampion()">Confirmar</button></div>`}
  </div>`;
  // Fixture selector
  const addedIds=new Set(STATE.matches.map(m=>m.id));
  const filtered=ALL_MATCHES.filter(m=>{
    if(!fixtureSearch)return true;
    const q=fixtureSearch.toLowerCase();
    return m.home.toLowerCase().includes(q)||m.away.toLowerCase().includes(q)||m.group.toLowerCase().includes(q)||m.phase.toLowerCase().includes(q);
  });
  const phaseGroups={};
  filtered.forEach(m=>{
    const key=m.phase+(m.group&&m.group!==m.phase?"|"+m.group:"");
    if(!phaseGroups[key])phaseGroups[key]={phase:m.phase,group:m.group,items:[]};
    phaseGroups[key].items.push(m);
  });
  html+=`<div class="card"><div class="card-title">➕ Agregar partidos</div>
    <p style="font-size:.78rem;color:var(--muted);margin-bottom:.7rem">Activa los partidos que quieres habilitar para pronósticos.</p>
    <input type="text" id="fix-search" placeholder="Buscar equipo o fase..." value="${fixtureSearch}" oninput="updateFixtureSearch(this.value)" style="margin-bottom:.5rem">
    <div class="search-count">${filtered.length} de ${ALL_MATCHES.length} — <button class="btn btn-sm btn-green" onclick="addAllFiltered()" style="margin-left:3px">+ Agregar todos visibles</button></div>
    <div class="fixture-list">`;
  Object.values(phaseGroups).forEach(pg=>{
    const label=pg.group&&pg.group!==pg.phase?`${pg.phase} — ${pg.group}`:pg.phase;
    html+=`<div class="phase-group-header">${label}</div>`;
    pg.items.forEach(m=>{
      const added=addedIds.has(m.id);
      html+=`<div class="fixture-item ${added?"selected":""}" onclick="toggleMatch('${m.id}')">
        <span class="fi-check">${added?"✓":""}</span>
        <span class="fi-teams">${m.home} vs ${m.away}</span>
        <span class="fi-meta">${m.datetime?fmtDateShort(m.datetime):""}</span>
      </div>`;
    });
  });
  html+=`</div></div>`;
  // Active match management
  if(STATE.matches.length){
    html+=`<div class="card-title" style="margin-top:.9rem">⚽ Gestión de partidos activos</div>`;
    const actPhases=[...new Set(STATE.matches.map(m=>m.phase))];
    actPhases.forEach(phase=>{
      html+=`<div class="section-title">${phase}</div>`;
      STATE.matches.filter(m=>m.phase===phase).forEach(m=>{
        html+=`<div class="match-card"><div class="match-header flex-between">
          <div class="row" style="gap:5px"><span class="phase-badge">${m.group||m.phase}</span>
            ${m.locked?'<span class="locked-badge">🔒 Cerrado</span>':'<span class="open-badge">✏️ Abierto</span>'}
          </div>
          <div class="row" style="gap:4px">
            ${m.locked
              ?`<button class="btn btn-outline btn-sm" onclick="unlockMatch('${m.id}')">🔓 Abrir</button>`
              :`<button class="btn btn-danger btn-sm" onclick="lockMatch('${m.id}')">🔒 Cerrar</button>`}
            <button class="btn btn-outline btn-sm" onclick="removeMatch('${m.id}')">✕</button>
          </div>
        </div>
        <div class="match-teams" style="margin:.35rem 0">
          <div class="team-left"><span class="team-name">${m.home}</span></div>
          <div style="text-align:center">
            <div class="score-inputs">
              <input class="score-input" type="number" min="0" max="20" value="${m.homeScore??""}" id="rs_h_${m.id}" placeholder="–" style="width:40px;height:34px;font-size:.85rem">
              <span class="score-sep">–</span>
              <input class="score-input" type="number" min="0" max="20" value="${m.awayScore??""}" id="rs_a_${m.id}" placeholder="–" style="width:40px;height:34px;font-size:.85rem">
            </div>
            <div style="margin-top:3px"><button class="btn btn-primary btn-sm" onclick="saveResult('${m.id}')">Guardar resultado</button></div>
          </div>
          <div class="team-right"><span class="team-name">${m.away}</span></div>
        </div></div>`;
      });
    });
  }
  return html;
}

// ACTIONS (with Supabase sync)

async function saveChampion(){
  const v=document.getElementById("champ-input")?.value.trim();
  if(!v){toast("Escribe un equipo",true);return;}
  if(STATE.champion){toast("El torneo ya comenzó",true);return;}
  try{
    setSyncStatus("syncing");
    await upsert("champion_picks",{user_id:currentUser.id,team:v,updated_at:new Date().toISOString()});
    STATE.champion_picks[currentUser.id]=v;
    setSyncStatus("ok");toast("✅ Predicción guardada: "+v);render();
  }catch(e){setSyncStatus("error");toast("Error: "+e.message,true);}
}

async function savePred(matchId){
  const m=STATE.matches.find(x=>x.id===matchId);
  if(!m||m.locked){toast("Partido cerrado",true);return;}
  const hEl=document.getElementById("ph_"+matchId),aEl=document.getElementById("pa_"+matchId);
  if(!hEl||!aEl)return;
  const h=hEl.value,a=aEl.value;
  if(h===""||a==="")return;
  try{
    setSyncStatus("syncing");
    // DELETE existing then INSERT fresh — most reliable approach
    await fetch(`${SB_URL}/rest/v1/predictions?user_id=eq.${encodeURIComponent(currentUser.id)}&match_id=eq.${encodeURIComponent(matchId)}`,{
      method:"DELETE",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}
    });
    const res=await fetch(`${SB_URL}/rest/v1/predictions`,{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal"},
      body:JSON.stringify({user_id:currentUser.id,match_id:matchId,home:h,away:a,updated_at:new Date().toISOString()})
    });
    if(!res.ok){const e=await res.text();throw new Error(e);}
    if(!STATE.predictions[currentUser.id])STATE.predictions[currentUser.id]={};
    STATE.predictions[currentUser.id][matchId]={home:h,away:a};
    setSyncStatus("ok");
    // Update UI label without full re-render
    const lbl=document.getElementById("lbl_"+matchId);
    if(lbl){lbl.textContent="✓ guardado";lbl.style.color="var(--success)";}
    toast("✅ Pronóstico guardado");
  }catch(e){setSyncStatus("error");toast("Error: "+e.message,true);}
}

function updateFixtureSearch(v){fixtureSearch=v;render();setTimeout(()=>{const el=document.getElementById("fix-search");if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}},10);}

async function toggleMatch(id){
  const existing=STATE.matches.findIndex(m=>m.id===id);
  if(existing>=0){
    try{
      setSyncStatus("syncing");
      await dbDelete("matches","id=eq."+id);
      STATE.matches.splice(existing,1);setSyncStatus("ok");toast("Partido quitado");
    }catch(e){setSyncStatus("error");toast("Error: "+e.message,true);}
  }else{
    const t=ALL_MATCHES.find(m=>m.id===id);if(!t)return;
    try{
      setSyncStatus("syncing");
      await upsert("matches",{id:t.id,home:t.home,away:t.away,phase:t.phase,match_group:t.group,datetime:t.datetime,locked:false,home_score:"",away_score:""});
      STATE.matches.push({id:t.id,home:t.home,away:t.away,phase:t.phase,group:t.group,datetime:t.datetime,locked:false,homeScore:"",awayScore:""});
      setSyncStatus("ok");toast("✅ "+t.home+" vs "+t.away);
    }catch(e){setSyncStatus("error");toast("Error: "+e.message,true);}
  }
  render();setTimeout(()=>{const el=document.getElementById("fix-search");if(el){el.focus();el.value=fixtureSearch;el.setSelectionRange(el.value.length,el.value.length);}},20);
}

async function addAllFiltered(){
  const addedIds=new Set(STATE.matches.map(m=>m.id));
  const q=fixtureSearch.toLowerCase();
  const toAdd=ALL_MATCHES.filter(m=>{
    if(addedIds.has(m.id))return false;
    if(!q)return true;
    return m.home.toLowerCase().includes(q)||m.away.toLowerCase().includes(q)||m.group.toLowerCase().includes(q)||m.phase.toLowerCase().includes(q);
  });
  if(!toAdd.length){toast("Todos ya están agregados");return;}
  try{
    setSyncStatus("syncing");
    const rows=toAdd.map(t=>({id:t.id,home:t.home,away:t.away,phase:t.phase,match_group:t.group,datetime:t.datetime,locked:false,home_score:"",away_score:""}));
    await upsert("matches",rows);
    toAdd.forEach(t=>STATE.matches.push({id:t.id,home:t.home,away:t.away,phase:t.phase,group:t.group,datetime:t.datetime,locked:false,homeScore:"",awayScore:""}));
    setSyncStatus("ok");toast("✅ "+toAdd.length+" partidos agregados");render();
  }catch(e){setSyncStatus("error");toast("Error: "+e.message,true);}
}

async function lockMatch(id){
  try{
    setSyncStatus("syncing");
    await dbPatch("matches",{locked:true},"id=eq."+id);
    const m=STATE.matches.find(x=>x.id===id);if(m)m.locked=true;
    setSyncStatus("ok");toast("🔒 Partido cerrado");render();
  }catch(e){setSyncStatus("error");toast("Error: "+e.message,true);}
}
async function unlockMatch(id){
  try{
    setSyncStatus("syncing");
    await dbPatch("matches",{locked:false},"id=eq."+id);
    const m=STATE.matches.find(x=>x.id===id);if(m)m.locked=false;
    setSyncStatus("ok");toast("🔓 Partido abierto");render();
  }catch(e){setSyncStatus("error");toast("Error: "+e.message,true);}
}
async function removeMatch(id){
  if(!confirm("¿Quitar este partido?"))return;
  try{
    setSyncStatus("syncing");
    await dbDelete("matches","id=eq."+id);
    STATE.matches=STATE.matches.filter(x=>x.id!==id);
    setSyncStatus("ok");render();
  }catch(e){setSyncStatus("error");toast("Error: "+e.message,true);}
}
async function saveResult(id){
  const m=STATE.matches.find(x=>x.id===id);if(!m)return;
  const h=document.getElementById("rs_h_"+id)?.value??"";
  const a=document.getElementById("rs_a_"+id)?.value??"";
  try{
    setSyncStatus("syncing");
    const locked=h!==""&&a!=="";
    await dbPatch("matches",{home_score:h,away_score:a,locked},"id=eq."+id);
    m.homeScore=h;m.awayScore=a;if(locked)m.locked=true;
    setSyncStatus("ok");toast("✅ Resultado guardado");render();
  }catch(e){setSyncStatus("error");toast("Error: "+e.message,true);}
}
